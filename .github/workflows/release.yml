name: release

on:
  push:
    tags:
    - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install PlatformIO
      run: pip install platformio

    - name: Build Firmware
      working-directory: firmware
      run: pio run

    - name: Upload Firmware Artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-bin-${{ github.ref_name }}
        path: FlashBangFirmware/.pio/build/genericSTM32F103C8/firmware.bin

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Linux deps for host build
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libudev-dev

    - name: Test Host
      working-directory: FlashBangStudio
      run: cargo test --all-targets --locked

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: FlashBangFirmware/.pio/build/genericSTM32F103C8/firmware.bin
        generate_release_notes: true
